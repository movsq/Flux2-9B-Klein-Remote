services:
  server:
    build: ./server
    restart: unless-stopped
    # No ports exposed to host — Caddy is the only public entry point.
    environment:
      - PORT=3000
      - PC_SECRET=${PC_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_TTL_MS=${SESSION_TTL_MS:-86400000}
      - DB_PATH=/app/data/comfylink.db
    volumes:
      - server_data:/app/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddy uses FLUX_KLEIN_HOST as the site address in the Caddyfile ({$FLUX_KLEIN_HOST}).
      - FLUX_KLEIN_HOST=${FLUX_KLEIN_HOST:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Built Svelte frontend is served as static files by Caddy directly.
      - ./client/dist:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  caddy_data:
  caddy_config:
  server_data:
